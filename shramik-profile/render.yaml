services:
  - type: web
    name: shramik-api
    env: node
    rootDir: shramik-profile
    buildCommand: npm install
    startCommand: npm run start:api
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: FRONTEND_ORIGIN
        value: https://shramik-web.onrender.com

  - type: web
    name: shramik-web
    env: static
    rootDir: shramik-profile
    buildCommand: npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        value: https://shramik-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
